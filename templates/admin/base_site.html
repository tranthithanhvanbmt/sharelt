{% extends "admin/base.html" %}
{% load static %}

{% block title %}ShareIt Admin{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'admin/css/custom_admin.css' %}">
<style>
    :root {
        --admin-primary: #2ecc71;
        --admin-secondary: #27ae60;
        --admin-dark: #2c3e50;
    }

    body {
        background: #f6fbf8;
        color: #1f2937;
    }

    #header {
        background: linear-gradient(120deg, var(--admin-dark), #1f6f50);
        color: #ecf0f1;
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.14);
    }

    #header a,
    #user-tools,
    #user-tools a {
        color: #ecfdf5;
    }

    #content,
    .module,
    #changelist-form .results,
    .dashboard .module {
        background: #fff;
        border-radius: 14px;
        border: 1px solid #dcfce7;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }

    .module h2,
    .module caption {
        background: #ecfdf3;
        color: #14532d;
        border-bottom: 1px solid #d1fae5;
        border-radius: 14px 14px 0 0;
        font-weight: 700;
    }

    .button,
    button,
    input[type="submit"],
    .submit-row input {
        background: var(--admin-primary);
        border-color: var(--admin-primary);
        border-radius: 10px;
        color: white;
    }

    .button:hover,
    button:hover,
    input[type="submit"]:hover,
    .submit-row input:hover {
        background: var(--admin-secondary);
        border-color: var(--admin-secondary);
    }

    tr:nth-child(even) {
        background: #f9fefb;
    }

    tr:hover {
        background: #ecfdf5;
    }
</style>
{% endblock %}

{% block branding %}
<div class="branding-wrap">
    <h1 id="site-name"><a href="{% url 'admin:index' %}">ShareIt Control Center</a></h1>
    <p class="branding-subtitle">Quan ly mon do noi bo thong minh</p>
</div>
{% endblock %}

{% block nav-global %}{% endblock %}
