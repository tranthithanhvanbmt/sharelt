{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body">
                <h4 class="mb-4 text-danger">⚠️ Xác nhận xóa bài đăng</h4>
                <p>Bạn có chắc chắn muốn xóa bài đăng "<strong>{{ item.name }}</strong>"?</p>
                <p class="text-muted small">Hành động này không thể hoàn tác.</p>
                
                <div class="d-flex gap-2 mt-4">
                    <form method="post" style="display: inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">
                            Xóa bài đăng
                        </button>
                    </form>
                    <a href="{% url 'item_detail' item.id %}" class="btn btn-secondary">
                        Hủy
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
