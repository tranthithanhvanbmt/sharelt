{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0" style="border-radius: 16px;">
            <div class="card-body p-4">
                <h3 class="mb-3">Tạo tài khoản mới</h3>
                <p class="text-muted small">Đăng ký để đăng món đồ và gửi yêu cầu mượn trong cộng đồng.</p>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-success w-100" type="submit">Đăng ký</button>
                </form>
                <p class="small text-muted mt-3 mb-0">
                    Đã có tài khoản? <a href="{% url 'login' %}">Đăng nhập ngay</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
